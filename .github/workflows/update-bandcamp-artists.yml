name: Update Bandcamp artist metadata

on:
  push:
    branches:
      - main
    paths-ignore:
      - "src/data/artists.generated.ts"
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bandcamp-artist-metadata
  cancel-in-progress: true

jobs:
  update-bandcamp-artists:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Generate Bandcamp artist metadata
        run: yarn generate:bandcamp-artists

      - name: Build site
        run: yarn build

      - name: Commit generated metadata
        run: |
          if git diff --quiet -- src/data/artists.generated.ts; then
            echo "No generated metadata changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/artists.generated.ts
          git commit -m "Update Bandcamp artist metadata"
          git push
